# Chats2Me tool manifest — todos.in
# One file per service. This file is sufficient for Chats2Me to discover,
# present, and execute every tool the service exposes. An OpenAPI document
# alongside it is optional (useful for validation, not required at runtime).

manifest_version: "0.1.0"

service:
  id: todos
  mention: todos                    # what the user types after @
  display_name: Todos
  description: List and manage todos.in task lists (markdown per list)

server:
  base_url: https://todos.in

# POST link-key: Bearer lak_ from users.legendum_account_key_encrypted.
# JSON account_token: cache (user_service_links); Bearer on tool/options HTTP.
# Re-link via link-key if rejected. Todos bills that token on API, not lak_.
auth:
  type: bearer
  link:
    path: /t/legendum/link-key
    method: POST

# URL suffix: list uses GET / (JSON). Read/write list use .md (read) or .json (response shape after write) on /{list}.

# --------------------------------------------------------------------------
# Tools (model sees todos__<id>, e.g. todos__list_lists)
# --------------------------------------------------------------------------

tools:
  - id: list_lists
    title: List todo lists
    description: >
      Returns JSON: lists[] with slug, name, counts, etc. The path parameter
      for read_list and write_list must be lists[].slug (URL slug),
      not the display name. Call this before read/write if the slug is unknown.
    path: /
    method: GET
    expose: [actions, model]
    content_type: json

  - id: read_list
    title: Read todo document
    description: >
      Fetch the full markdown document for one list. Tasks are line-based
      markdown (e.g. "- [ ] …"). To change todos, edit the markdown and call
      write_list with the complete updated body.
    path: /{list}
    method: GET
    expose: [model]
    content_type: markdown
    parameters:
      - name: list
        in: path
        label: List slug
        description: >
          Exact slug string from list_lists (lists[].slug), e.g. today or health.
          Do not pass the human-readable name field.
        required: true
        input: dropdown
        options:
          from: GET /
          value: slug
          label: name

  - id: write_list
    title: Write todo document
    description: >
      Replace the entire markdown for a list. The body must be the full
      document (not a patch). Use the same markdown task-list format as returned
      by read_list.
    path: /{list}
    method: PUT
    expose: [model]
    content_type: json
    parameters:
      - name: list
        in: path
        label: List slug
        description: >
          Exact slug string from list_lists (lists[].slug), e.g. today or health.
          Do not pass the human-readable name field.
        required: true
        input: dropdown
        options:
          from: GET /
          value: slug
          label: name
      - name: markdown
        in: body
        label: Full markdown body
        required: true
