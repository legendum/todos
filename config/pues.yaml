# Which pues/base/ subdirectories this consumer vendors.
# Add entries here to adopt more of pues over time, then run `bun run pues`.
pues:
  - core
  - theme
  - auth
  - objects
  - sse
  - pwa
  - db
  - style

# Canonical consumer identifier. Lowercase slug. Drives:
#   - data/<core.name>.db   (base/db/ default)
#   - /<core.name>-192.png and -512.png (PWA icon defaults)
#   - PWA manifest display name (overridden below for capitalisation)
core:
  name: todos

# `base/style/` reads `style:` (SPEC §8.1). todos rides the pues
# defaults; expand here (style.dark / style.light / style.vars /
# style.css) when brand needs diverge.

# `base/objects/` reads this section. Role mapping per SPEC §5.2.
# todos' `lists` table matches every default in §5.3 so no `columns:`
# block is needed; the loader silently drops the absent `meta` role
# at startup.
objects:
  resources:
    lists:
      table: lists
