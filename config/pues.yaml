# Which pues/base/ subdirectories this consumer vendors.
# Add entries here to adopt more of pues over time, then run `bun run pues`.
pues:
  - core
  - theme
  - auth
  - objects
  - sse
  - pwa
  - db

core:
  name: todos

# `base/db/` reads this section. SQLite WAL + foreign keys are baked
# in; pues applies `config/schema.sql` and any pending
# `config/migrations/*.sql` on first `getDb()`. PUES_DB_PATH env var
# overrides the path (used by tests).
db:
  path: data/todos.db

# `base/pwa/` reads this section. Pues bakes start_url + display +
# icon type/purpose; everything else is per-consumer.
pwa:
  name: Todos
  background_color: "#0f172a"
  theme_color: "#0f172a"

# `base/objects/` reads this section. Role mapping per SPEC §5.2.
# todos' `lists` table matches every default in §5.3 so no `columns:`
# block is needed; the loader silently drops the absent `meta` role
# at startup.
objects:
  resources:
    lists:
      table: lists
