# todos.in — Nginx site configuration
# Copy to /etc/nginx/sites-available/todos.in
# Then: ln -s /etc/nginx/sites-available/todos.in /etc/nginx/sites-enabled/

# Redirect HTTP → HTTPS and www → bare domain
server {
    listen 80;
    listen [::]:80;
    server_name todos.in www.todos.in;
    return 301 https://todos.in$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name todos.in www.todos.in;

    # TLS (Let's Encrypt / certbot)
    ssl_certificate /etc/letsencrypt/live/todos.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/todos.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Redirect www to bare domain
    if ($host = www.todos.in) {
        return 301 https://todos.in$request_uri;
    }

    # Proxy to Bun server
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE — disable buffering so events stream immediately
    location ~ ^/w/[A-Z0-9]+/events$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 86400s;
    }

    # Static assets — content-hashed, cache forever
    location /dist/ {
        alias /opt/todos/public/dist/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Install script
    location = /install.sh {
        alias /opt/todos/public/install.sh;
        default_type text/plain;
    }

    # Health check
    location = /health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }
}
